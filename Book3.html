<!doctype html>
<html lang="en">
  <!-- ============================================================
     ADVENTURE ISLAND — book0.html
     ============================================================
     CUSTOMISE THIS SECTION:
       • PAGE_TITLE  — text shown in the browser tab
       • HEADING     — the big h1 displayed on screen
       • buttons[]   — one entry per button:
             label : text shown on the button
             url   : destination when tapped
       • cornerImg  — path/URL for the bottom-right corner image

     ORIENTATION BEHAVIOUR:
       • Portrait  → 1 × 2 vertical stack
       • Landscape → 2 × 1 horizontal grid
       • h1 shown in BOTH orientations

     FONT STACK:
       iOS / macOS  → Chalkboard SE  (system font, no download needed)
       Android / PC → Comic Sans MS  (system font) or Comic Neue (Google Font fallback)
     ============================================================ -->

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
          maximum-scale=1.0, user-scalable=no"
    />
    <title>Adventure Island 3</title>

    <!-- Comic Neue — fallback web font for devices without Comic Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ----------------------------------------------------------
         RESET & ROOT
      ---------------------------------------------------------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        /* Font stack: Chalkboard SE (iOS/macOS) → Comic Sans (Windows/Android) → Comic Neue (web fallback) */
        --font-chalk:
          "Chalkboard SE", "Chalkboard", "Comic Neue", "Comic Sans MS", cursive;

        /* Colours — matched to main page */
        --colour-btn-face: #ffd600;
        --colour-btn-active: #ffc200;
        --colour-btn-border: #000000;
        --colour-heading-text: orange;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        max-width: 100vw;
      }

      body {
        font-family: var(--font-chalk);
        background: linear-gradient(to bottom, #6593f6, #08328c);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        transition: background 0.3s ease;
      }

      /* ----------------------------------------------------------
         HEADING
      ---------------------------------------------------------- */
      h1 {
        font-family: var(--font-chalk);
        color: var(--colour-heading-text);
        width: 100%;
        text-align: center;
        letter-spacing: 0.03em;
        flex-shrink: 0;
        -webkit-text-stroke: 2px yellow;
      }

      /* ----------------------------------------------------------
         GRID WRAPPER
      ---------------------------------------------------------- */
      .grid-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      /* ----------------------------------------------------------
         BUTTONS
      ---------------------------------------------------------- */
      .btn {
        font-family: var(--font-chalk);
        font-weight: bold;
        color: yellow;
        background: var(--colour-btn-face);
        border: 2px solid var(--colour-btn-border);
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-text-stroke: 2px orange;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }

      .btn:active {
        transform: scale(0.97);
        background: var(--colour-btn-active);
      }

      /* ----------------------------------------------------------
         BACK BUTTON
      ---------------------------------------------------------- */
      .back-btn {
        font-family: var(--font-chalk);
        font-weight: bold;
        color: yellow;
        background: rgba(0, 0, 0, 0.3);
        border: 2px solid yellow;
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
        -webkit-text-stroke: 1px orange;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
        flex-shrink: 0;
        align-self: flex-start;
        font-size: 1.2rem;
        padding: 0.4em 1.2em;
        margin: 10px 0 0 10px;
      }
      /* ----------------------------------------------------------
         CORNER IMAGE
      ---------------------------------------------------------- */
      .corner-img {
        position: fixed;
        bottom: 0;
        right: 0;
        pointer-events: none;
        z-index: 10;
      }

      /* ----------------------------------------------------------
         LANDSCAPE — horizontal 2 × 1 grid
      ---------------------------------------------------------- */
      @media screen and (orientation: landscape) {
        body {
          background: linear-gradient(to bottom, #e5aa60, #bb581c);
          overflow: hidden;
        }

        .back-btn {
          font-size: clamp(1.5rem, 2.5vw, 2.5rem) !important;
          padding: 0.4em 1.2em !important;
          margin: 3vh 0 0 3vw !important;
        }

        h1 {
          font-size: clamp(2rem, 7vw, 7rem);
          padding: 0.1em 0.5em;
          margin-top: 5vh;
          margin-bottom: -8vh;
        }

        .grid-wrapper {
          padding: 1vh 2vw 2vh;
          margin-top: 2vh;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          grid-template-rows: 1fr;
          gap: clamp(6px, 1.4vw, 16px);
          width: min(94vw, 920px);
        }

        .btn {
          font-size: clamp(1rem, 6vw, 4rem);
          height: clamp(60px, 35vh, 180px);
        }

        .corner-img {
          position: fixed;
          top: 0;
          right: 0;
          bottom: auto;
          width: clamp(60px, 12vw, 160px);
          margin-top: 30px;
          margin-right: 30px;
        }
      }

      /* ----------------------------------------------------------
         LANDSCAPE IPHONE — smaller screens
      ---------------------------------------------------------- */
      @media screen and (orientation: landscape) and (max-height: 450px) {
        body {
          background: linear-gradient(to bottom, #e5aa60, #bb581c);
          overflow: hidden;
          width: 100vw !important;
          min-width: 100vw !important;
          overflow-x: hidden !important;
        }
        .back-btn {
          font-size: clamp(1.2rem, 2.5vw, 2rem) !important;
          padding: 0.4em 1em !important;
          margin: 3vh 0 0 2vw !important;
        }

        h1 {
          font-size: clamp(1rem, 7vw, 4rem) !important;
          padding: 0.1em 0.5em !important;
          margin-top: -3vh !important;
          margin-bottom: -8vh !important;
        }

        .grid-wrapper {
          padding: 1vh 6vw 2vh;
          margin-top: 1vh;
        }

        .btn {
          height: clamp(40px, 28vh, 100px) !important;
          font-size: clamp(0.9rem, 5vw, 3rem) !important;
        }

        .corner-img {
          width: clamp(40px, 8vw, 80px);
        }
      }

      /* ----------------------------------------------------------
         PORTRAIT — vertical 1 × 2 stack
      ---------------------------------------------------------- */
      @media screen and (orientation: portrait) {
        body {
          overflow-y: auto;
          background: linear-gradient(to bottom, #e5aa60, #bb581c);
        }

        .back-btn {
          font-size: clamp(1.2rem, 4vw, 4rem) !important;
          padding: 0.4em 1em !important;
          margin: 3vh 0 0 6vw !important;
        }

        h1 {
          font-size: clamp(1.5rem, 12vw, 4rem);
          padding: 0.3em 0.5em;
        }

        .grid-wrapper {
          padding: 2vw 9vw 16vw;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr;
          gap: clamp(10px, 10vw, 100px);
          width: 100%;
          max-width: 480px;
        }

        .btn {
          font-size: clamp(1rem, 10vw, 4rem);
          height: clamp(70px, 30vw, 300px);
        }

        .corner-img {
          width: clamp(60px, 20vw, 130px);
          margin-bottom: 30px;
          margin-right: 30px;
        }
      }

      /* ----------------------------------------------------------
         PORTRAIT IPHONE — smaller screens
      ---------------------------------------------------------- */
      @media screen and (orientation: portrait) and (max-width: 430px) {
        .back-btn {
          font-size: clamp(1.2rem, 4vw, 2rem) !important;
          padding: 0.4em 1em !important;
          margin: 3vh 0 0 6vw !important;
        }

        h1 {
          font-size: clamp(1.2rem, 12vw, 4rem) !important;
          padding: 0.3em 0.5em !important;
          -webkit-text-stroke: 1.5px yellow;
          line-height: 1;
        }

        .grid-wrapper {
          padding: 1vw 9vw 2vw !important;
          margin-top: -5vh !important;
        }

        .grid {
          gap: 40px !important;
        }

        .btn {
          height: clamp(70px, 25vw, 120px) !important;
          font-size: clamp(0.9rem, 10vw, 3rem) !important;
        }

        .corner-img {
          width: clamp(50px, 18vw, 100px);
        }
      }
    </style>
  </head>

  <body>
    <!-- Back button -->
    <a class="back-btn" href="index.html">← Back</a>

    <!-- Heading -->
    <h1>Adventure Island 3</h1>

    <!-- Button grid -->
    <div class="grid-wrapper">
      <div class="grid" id="main-grid">
        <a
          class="btn"
          href="https://example.com/book0-unit1"
          style="background-color: orange"
        >
          Units 1–10
        </a>

        <a
          class="btn"
          href="https://example.com/book0-unit2"
          style="background-color: orange"
        >
          Units 11–20
        </a>
      </div>
    </div>

    <!-- ============================================================
         CORNER IMAGE
         Replace the src with your actual image path.
         e.g. src="images/corner-character.png"
    ============================================================ -->
    <img
      class="corner-img"
      src="images/Sami3.2.png"
      alt=""
      aria-hidden="true"
    />
  </body>
</html>
