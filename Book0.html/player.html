<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: black;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <a
      href="javascript:history.back()"
      style="
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 30px;
        background-color: orange;
        color: black;
        font-family: &quot;Comic Sans MS&quot;, cursive;
        font-size: 20pt;
        text-decoration: none;
        border: 3px solid black;
        border-radius: 10px;
        z-index: 999;
      "
      >← Back</a
    >
    <script>
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get("v");
      document.write(
        `<iframe src="https://player.mediadelivery.net/embed/597166/${videoId}" allowfullscreen style="width:100%;height:100%;border:none;"></iframe>`,
      );
    </script>
  </body>
</html>
