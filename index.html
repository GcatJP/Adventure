<!doctype html>
<html lang="en">
  <!-- ============================================================
     ADVENTURE ISLAND — index.html
     ============================================================
     CUSTOMISE THIS SECTION:
       • PAGE_TITLE  — text shown in the browser tab
       • HEADING     — the big h1 displayed on screen
       • books[]     — one entry per button:
             label : number shown in landscape  (e.g. "0")
             url   : destination when tapped
             imgL  : path/URL for the LEFT  image inside the button
             imgR  : path/URL for the RIGHT image inside the button
                     (set imgR the same as imgL if you want one image)

     ORIENTATION BEHAVIOUR:
       • Portrait  → 1 × 6 vertical stack, labels read "Book 0" … "Book 5"
       • Landscape → 2 × 3 grid,           labels read "0" … "5"
       • Landscape background is blue (#1565C0); portrait is black.

     FONT STACK:
       iOS / macOS  → Chalkboard SE  (system font, no download needed)
       Android / PC → Comic Sans MS  (system font) or Comic Neue (Google Font fallback)
     ============================================================ -->

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no"
    />
    <title>Adventure Island</title>

    <!-- Comic Neue — fallback web font for devices without Comic Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ----------------------------------------------------------
                             RESET & ROOT
                          ---------------------------------------------------------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        /* Font stack: Chalkboard SE (iOS/macOS) → Comic Sans (Windows/Android) → Comic Neue (web fallback) */
        --font-chalk:
          "Chalkboard SE", "Chalkboard", "Comic Neue", "Comic Sans MS", cursive;

        /* Colours */

        --colour-btn-face: #ffd600;
        --colour-btn-active: #ffc200;
        --colour-btn-border: #000000;
        --colour-heading-text: orange;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: var(--font-chalk);
        background: linear-gradient(to bottom, #4ea9e5, #486f8d);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        transition: background 0.3s ease;
      }

      /* ----------------------------------------------------------
                             HEADING
                          ---------------------------------------------------------- */
      h1 {
        font-family: var(--font-chalk);
        color: var(--colour-heading-text);
        width: 100%;
        text-align: center;
        letter-spacing: 0.03em;
        flex-shrink: 0;
        -webkit-text-stroke: 2px yellow;
      }

      /* ----------------------------------------------------------
                             GRID WRAPPER  (centres the grid on screen)
                          ---------------------------------------------------------- */
      .grid-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      /* ----------------------------------------------------------
                             BUTTON  (each book link)
                             Images sit flush-left and flush-right INSIDE the button.
                             The label is centred in the remaining space.
                          ---------------------------------------------------------- */
      .btn {
        font-family: var(--font-chalk);
        font-weight: bold;
        color: var(--colour-btn-border);
        background: var(--colour-btn-face);
        border: 2px solid var(--colour-btn-border);
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }

      .btn:active {
        transform: scale(0.97);
        background: var(--colour-btn-active);
      }

      /* Images inside the button */
      .btn-img {
        display: block;
        flex-shrink: 0;
        object-fit: cover;
        height: 100%;
        max-height: 90%;
        width: auto;
        margin: 0 8px;
      }

      /* Label between the images */
      .btn-label {
        flex: 1;
        text-align: center;
        line-height: 1.1;
        padding: 0 0.25em;
        color: yellow;
        -webkit-text-stroke: 2px orange;
      }

      /* ----------------------------------------------------------
                             LANDSCAPE  — blue background, 2 × 3 grid
                          ---------------------------------------------------------- */
      @media screen and (orientation: landscape) {
        body {
          background: linear-gradient(to bottom, #4ea9e5, #486f8d);
          overflow: hidden;
        }

        h1 {
          font-size: clamp(2.5rem, 8vw, 9rem);
          padding: 0.1em 0.5em;
          margin-top: 8vh;
          margin-bottom: -8vh;
        }

        .grid-wrapper {
          padding: 1vh 2vw 2vh;
          margin-top: 2vh;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(2, 1fr);
          gap: clamp(6px, 1.4vw, 16px);
          width: min(94vw, 920px);
        }

        .btn {
          font-size: clamp(1.1rem, 8vw, 9rem);
          height: clamp(48px, 50vh, 150px);
        }

        .btn-img {
          height: clamp(36px, 19vh, 140px);
        }
      }
      @media screen and (orientation: landscape) and (max-height: 450px) {
        body {
          background: linear-gradient(to bottom, #4ea9e5, #486f8d);
          overflow: hidden;
        }
        h1 {
          display: none !important;
        }
        body {
          width: 100vw !important;
          min-width: 100vw !important;
          overflow-x: hidden !important;
        }
        .grid-wrapper {
          align-items: flex-start;
          padding: 1vh 6vw 2vh;
          margin-top: 4vh;
        }

        .btn {
          height: clamp(40px, 30vh, 100px);
        }
      }

      /* ----------------------------------------------------------
                             PORTRAIT  — black background, 1 × 6 stack
                          ---------------------------------------------------------- */
      @media screen and (orientation: portrait) {
        body {
          overflow-y: auto;
          background: linear-gradient(to bottom, #4ea9e5, #486f8d);
        }

        h1 {
          font-size: clamp(1.5rem, 9vw, 4rem);
          padding: 0.3em 0.5em;
        }

        .grid-wrapper {
          padding: 2vw 5vw 4vw;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr;
          gap: clamp(6px, 4vw, 14px);
          width: 100%;
          max-width: 480px;
        }

        .btn {
          font-size: clamp(1rem, 5.5vw, 1.9rem);
          height: clamp(54px, 26vw, 100px);
        }

        .btn-img {
          height: clamp(44px, 19vw, 80px);
        }
      }
      @media screen and (orientation: portrait) and (max-width: 430px) {
        h1 {
          display: none !important;
        }

        .grid-wrapper {
          padding: 1vw 9vw 2vw !important;
          margin-top: 0vh !important;
        }

        .grid {
          gap: 16px !important;
        }

        .btn {
          height: clamp(50px, 20vw, 90px) !important;
          font-size: clamp(0.8rem, 18vw, 3rem) !important;
        }

        .btn-img {
          height: clamp(40px, 15vw, 70px) !important;
        }
      }
    </style>
  </head>

  <body>
    <h1>Adventure Island</h1>

    <div class="grid-wrapper">
      <div class="grid" id="main-grid">
        <!-- Buttons are built by the script below -->
      </div>
    </div>

    <script>
      /* ==========================================================
         BOOK DATA
         Update each entry with your real URLs and image paths.
         imgL = image on the LEFT  side of the button
         imgR = image on the RIGHT side of the button
         (Use the same path for both if you want a single image repeated.)
      ========================================================== */
      const books = [
        {
          label: "0",
          url: "https://example.com/book0",
          imgL: "images/Kevin0.png",
          imgR: "images/Sami0.png",
          colour: "#d63e3e",
        },
        {
          label: "1",
          url: "https://example.com/book1",
          imgL: "images/Kevin1.png",
          imgR: "images/Sami1.png",
          colour: "#1d52c9",
        },
        {
          label: "2",
          url: "https://example.com/book2",
          imgL: "images/Kevin2.png",
          imgR: "images/Sami2.png",
          colour: "#4b8e3b",
        },
        {
          label: "3",
          url: "https://example.com/book3",
          imgL: "images/Kevin3.png",
          imgR: "images/Sami3.png",
          colour: "#f5a638",
        },
        {
          label: "4",
          url: "https://example.com/book4",
          imgL: "images/Kevin4.png",
          imgR: "images/Sami4.png",
          colour: "#a8dadc",
        },
        {
          label: "5",
          url: "https://example.com/book5",
          imgL: "images/Kevin5.png",
          imgR: "images/Sami5.png",
          colour: "#9b5de5",
        },
      ];
      /* ==========================================================
         BUILD GRID
         Called on load and whenever orientation changes.
         Portrait  → label reads "Book 0" … "Book 5"
         Landscape → label reads "0" … "5"
      ========================================================== */
      function isPortrait() {
        return window.matchMedia("(orientation: portrait)").matches;
      }

      function buildGrid() {
        const grid = document.getElementById("main-grid");
        const portrait = isPortrait();

        grid.innerHTML = "";

        books.forEach(function (book) {
          /* --- anchor (the yellow button itself) --- */
          var link = document.createElement("a");
          link.className = "btn";
          link.href = book.url;
          link.style.backgroundColor = book.colour;

          /* --- left image --- */
          var imgL = document.createElement("img");
          imgL.className = "btn-img";
          imgL.src = book.imgL;
          imgL.alt = "";
          imgL.setAttribute("aria-hidden", "true");

          /* --- centred label --- */
          var label = document.createElement("span");
          label.className = "btn-label";
          label.textContent = portrait ? "Book " + book.label : book.label;

          /* --- right image --- */
          var imgR = document.createElement("img");
          imgR.className = "btn-img";
          imgR.src = book.imgR;
          imgR.alt = "";
          imgR.setAttribute("aria-hidden", "true");

          link.appendChild(imgL);
          link.appendChild(label);
          link.appendChild(imgR);
          grid.appendChild(link);
        });
      }

      /* Run on first load */
      buildGrid();

      /* Re-run when device rotates */
      var resizeTimer;
      window.addEventListener("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(buildGrid, 150);
      });
      window
        .matchMedia("(orientation: portrait)")
        .addEventListener("change", buildGrid);
      window
        .matchMedia("(orientation: landscape)")
        .addEventListener("change", buildGrid);
    </script>
  </body>
</html>
